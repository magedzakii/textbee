name: Android Build

on:
  push:
    paths:
      - android/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - android/**
      - .github/workflows/build.yml
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Lint, test, and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' && secrets.ANDROID_UPLOAD_STORE_PASSWORD != '' && secrets.ANDROID_UPLOAD_KEY_ALIAS != '' && secrets.ANDROID_UPLOAD_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Decode upload keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          echo "ANDROID_UPLOAD_STORE_FILE=$GITHUB_WORKSPACE/android/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Export release signing secrets
        if: env.HAS_RELEASE_SIGNING == 'true'
        run: |
          echo "ANDROID_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Lint production release
        working-directory: android
        run: ./gradlew --no-daemon :app:lintProdRelease

      - name: Run production unit tests
        working-directory: android
        run: ./gradlew --no-daemon :app:testProdReleaseUnitTest

      - name: Build production app bundle
        working-directory: android
        run: ./gradlew --no-daemon :app:bundleProdRelease

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: textbee-prod-release-aab
          path: android/app/build/outputs/bundle/prodRelease/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-prodRelease.*
          if-no-files-found: ignore
          retention-days: 14
